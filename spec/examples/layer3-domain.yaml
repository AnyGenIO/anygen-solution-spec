# ============================================================
# Layer 3: Domain Knowledge — 行业知识
# 告诉 AI 这个行业的业务规则、坑、最佳实践
# ============================================================

domain: cross-border-ecommerce
version: "1.0"

# ---- 行业角色 ----
personas:
  - id: listing-specialist
    name: Listing 优化专员
    responsibilities:
      - 产品上架（多平台同步）
      - 标题/描述/关键词优化
      - 图片/A+内容管理
      - 类目选择
    tools_used: [shopify-cli, amazon-sp-api, tiktok-shop-api, aliexpress-api]
    
  - id: ad-optimizer
    name: 广告优化师
    responsibilities:
      - PPC 广告创建和调优
      - ACOS/ROAS 监控
      - 关键词竞价管理
      - 预算分配
    tools_used: [amazon-sp-api, helium10-api]
    
  - id: inventory-manager
    name: 库存管理员
    responsibilities:
      - 库存监控和预警
      - 补货计划
      - 多仓调拨
      - FBA 发货
    tools_used: [shopify-cli, amazon-sp-api]

# ---- 业务规则（AI 必须知道的） ----
business_rules:
  - id: title-length
    scope: [amazon]
    rule: "Amazon 产品标题不超过 200 字符，建议 80-150 字符"
    severity: hard                   # hard=违反会失败, soft=建议
    
  - id: image-requirements
    scope: [amazon]
    rule: "主图必须纯白底（RGB 255,255,255），至少 1000x1000px，不能有水印/文字/边框"
    severity: hard
    
  - id: price-parity
    scope: [amazon, shopify]
    rule: "Amazon 不允许你在其他平台卖更低价格，否则可能被降权/封店"
    severity: hard
    
  - id: inventory-sync
    scope: [all]
    rule: "多平台销售时库存必须实时同步，否则超卖会导致差评和平台处罚"
    severity: hard
    
  - id: keyword-stuffing
    scope: [amazon]
    rule: "搜索词（Backend Keywords）不要重复标题中已有的词，最多 250 bytes"
    severity: soft

# ---- 常见工作流 ----
workflows:
  - id: new-product-launch
    name: 新品上架（多平台）
    description: 将一个新产品上架到多个平台
    steps:
      - order: 1
        action: "准备产品基础信息"
        details: "标题、描述、价格、SKU、图片、变体"
        manual: true                 # 需要人工输入
        
      - order: 2
        action: "在主平台创建产品"
        tool: shopify-cli
        capability: create-product
        
      - order: 3
        action: "同步到 Amazon"
        tool: amazon-sp-api
        capability: create-listing
        data_mapping: "shopify → amazon 字段映射见 tool spec"
        attention: "注意 Amazon 类目节点选择，错误类目会导致 listing 被压制"
        
      - order: 4
        action: "同步到 TikTok Shop"
        tool: tiktok-shop-api
        capability: create-product
        
      - order: 5
        action: "生成产品展示视频"
        tool: moneyprinter-turbo
        capability: generate-video
        input_from: "step 1 的产品图片和描述"
        
      - order: 6
        action: "上传视频到各平台"
        tool: [tiktok-shop-api, shopify-cli]
        
      - order: 7
        action: "设置库存同步"
        tools: [shopify-cli, amazon-sp-api, tiktok-shop-api]
        attention: "设置库存安全阈值，低于阈值自动预警"
        
  - id: competitor-monitoring
    name: 竞品监控
    trigger: "每日定时 / 价格变动触发"
    steps:
      - order: 1
        action: "爬取竞品 listing 页面"
        tool: lightpanda
        target: "竞品 ASIN/URL 列表"
        
      - order: 2
        action: "提取关键数据"
        data: [price, rating, review_count, bsr_rank, title, bullet_points]
        
      - order: 3
        action: "与自有产品对比"
        logic: "价格差异 > 10% 或 BSR 排名变化 > 20% 触发告警"
        
      - order: 4
        action: "生成竞品分析报告"
        output: "markdown 报告，发送到飞书/Slack"

# ---- 行业术语表（AI 理解用户指令必备） ----
glossary:
  ASIN: "Amazon Standard Identification Number，Amazon 产品唯一标识"
  BSR: "Best Sellers Rank，畅销排名"
  FBA: "Fulfillment by Amazon，亚马逊代发货"
  FBM: "Fulfillment by Merchant，卖家自发货"
  ACOS: "Advertising Cost of Sales = 广告花费/广告销售额"
  ROAS: "Return on Ad Spend = 广告销售额/广告花费（ACOS的倒数）"
  PPC: "Pay Per Click，按点击付费广告"
  Listing: "产品详情页，包括标题/图片/描述/价格"
  A+: "Amazon A+ Content，图文版品牌描述"
  Buy Box: "Amazon 购物车按钮，多卖家竞争同一ASIN时的显示权"
  SKU: "Stock Keeping Unit，库存单位，卖家自定义的产品编号"
  UPC: "Universal Product Code，通用产品条码"
  EAN: "European Article Number，欧洲产品条码"
  MOQ: "Minimum Order Quantity，最小起订量"

# ---- 各平台差异对照表 ----
platform_comparison:
  - feature: "产品标题长度"
    amazon: "200字符（建议80-150）"
    shopify: "无硬限制"
    tiktok: "建议30-80字符"
    aliexpress: "128字符"
    
  - feature: "主图要求"
    amazon: "纯白底，1000x1000px+"
    shopify: "无限制"
    tiktok: "建议 1:1，600x600px+"
    aliexpress: "800x800px+"
    
  - feature: "API 限流"
    amazon: "按时间恢复（1 request/sec）"
    shopify: "Leaky bucket（2 req/sec）"
    tiktok: "按日配额"
    aliexpress: "按日配额"
    
  - feature: "库存模型"
    amazon: "FBA（亚马逊仓）+ FBM（自发货）"
    shopify: "多 Location"
    tiktok: "平台仓 + 自发货"
    aliexpress: "自发货为主"
