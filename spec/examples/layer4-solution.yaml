# ============================================================
# Layer 4: Solution Template — 解决方案模板
# 告诉 AI 面对一个业务目标，怎么编排工具完成
# ============================================================

solution_id: new-product-multi-platform
name: 新品多平台上架
domain: cross-border-ecommerce
version: "1.0"

# 用户可能怎么说（触发识别）
trigger_phrases:
  - "帮我上一个新品"
  - "新产品上架到所有平台"
  - "把这个产品同步到亚马逊和TikTok"
  - "multi-platform product launch"

# 前置条件
prerequisites:
  - "至少一个平台的 API 已配置认证"
  - "产品基础信息已准备（标题、价格、图片）"

# 需要收集的信息（AI 问用户拿）
required_inputs:
  - field: product_title
    ask: "产品标题是什么？"
    type: string
    
  - field: product_description
    ask: "产品描述？"
    type: text
    
  - field: price
    ask: "售价？（需要指定币种）"
    type: money
    
  - field: sku
    ask: "SKU 编号？"
    type: string
    
  - field: images
    ask: "产品图片（URL 或本地路径）"
    type: array[url|file_path]
    min: 1
    
  - field: target_platforms
    ask: "上架到哪些平台？"
    type: array[enum]
    options: [shopify, amazon, tiktok, aliexpress]
    default: [shopify, amazon]
    
  - field: generate_video
    ask: "需要自动生成产品展示视频吗？"
    type: boolean
    default: true

# 执行计划
execution_plan:
  - step: 1
    name: "校验图片合规"
    description: "检查图片是否满足各平台要求"
    logic: |
      for platform in target_platforms:
        check image dimensions >= platform.min_image_size
        if platform == "amazon":
          check image has white background
          check image has no watermark
    on_fail: "提示用户修改图片，说明哪个平台哪个要求不满足"

  - step: 2
    name: "适配各平台数据"
    description: "根据平台差异调整标题、描述"
    logic: |
      for platform in target_platforms:
        adapted_title = truncate(product_title, platform.title_max_length)
        adapted_description = convert_format(product_description, platform.desc_format)
        # Amazon 需要 Bullet Points（5条）
        if platform == "amazon":
          bullet_points = extract_key_features(product_description, count=5)
    tools: []  # 纯逻辑，不调工具
    
  - step: 3
    name: "创建主平台产品"
    condition: "'shopify' in target_platforms"
    tool: shopify-cli
    capability: create-product
    params_mapping:
      title: "{adapted_title.shopify}"
      body_html: "{adapted_description.shopify}"
      variants: [{price: "{price}", sku: "{sku}"}]
      images: "{images}"
    save_output: "shopify_product_id"
    
  - step: 4
    name: "同步到 Amazon"
    condition: "'amazon' in target_platforms"
    tool: amazon-sp-api
    capability: create-listing
    params_mapping:
      item_name: "{adapted_title.amazon}"
      product_description: "{adapted_description.amazon}"
      bullet_point: "{bullet_points}"
      standard_price: "{price}"
      seller_sku: "{sku}"
      main_image_url: "{images[0]}"
    attention:
      - "需要选择正确的 Amazon 类目节点（browse_node_id）"
      - "如果是全新品牌，需要先通过 Brand Registry"
    save_output: "amazon_listing_id"

  - step: 5
    name: "同步到 TikTok Shop"
    condition: "'tiktok' in target_platforms"
    tool: tiktok-shop-api
    capability: create-product
    params_mapping:
      product_name: "{adapted_title.tiktok}"
      description: "{adapted_description.tiktok}"
      skus: [{original_price: "{price}", seller_sku: "{sku}"}]
      main_images: "{images}"
    save_output: "tiktok_product_id"

  - step: 6
    name: "生成产品视频"
    condition: "generate_video == true"
    tool: moneyprinter-turbo
    capability: generate-video
    params_mapping:
      subject: "{product_title}"
      images: "{images}"
      description: "{product_description}"
    save_output: "video_path"

  - step: 7
    name: "汇总报告"
    description: "输出上架结果汇总"
    output_template: |
      ✅ 新品上架完成！

      产品: {product_title}
      SKU: {sku}

      各平台状态:
      {% for platform in target_platforms %}
      - {platform}: {platform_status} (ID: {platform_product_id})
      {% endfor %}

      {% if video_path %}
      📹 产品视频已生成: {video_path}
      {% endif %}

      ⚠️ 后续事项:
      - Amazon listing 审核通常需要 24-48 小时
      - 记得设置库存同步
      - 建议 7 天内开启 PPC 广告推动初始流量

# 回滚策略
rollback:
  description: "任一平台失败时的处理"
  strategy: "partial_success"        # all_or_nothing | partial_success
  on_failure: |
    1. 已成功的平台保留，不回滚
    2. 失败的平台记录错误原因
    3. 汇总报告中标注哪些失败了
    4. 提供重试失败平台的命令
