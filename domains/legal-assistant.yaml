# 法务助理 — AI 工具说明书

domain: 法务
description: 合同审查、法规查询、裁判文书检索、电子签约、合规核查

tools:

  - name: CourtListener API
    id: courtlistener
    what: 美国法院裁判文书开放数据库API（Free Law Project），已超1亿次API请求
    install: pip install courtlistener-api-client  # 官方Python SDK
    auth:
      required: true
      method: api_key
      env_vars:
        - COURTLISTENER_API_TOKEN
      how_to_get: "courtlistener.com 注册账号 → Profile → API Token"
      pricing: 免费
    capabilities:
      - 美国联邦/州法院裁判文书检索
      - 案例全文搜索
      - 法官信息查询
      - 口头辩论音频
      - 案例引用关系图谱
      - PACER数据（部分免费）
      - 语义搜索API（2025年新增）
    when_to_use:
      - 美国法律案例研究
      - 查找类似判例
      - 分析法官判决倾向
    limits:
      - 仅覆盖美国法院
      - 部分PACER数据有版权限制
    docs: https://www.courtlistener.com/api/

  - name: 北大法宝 API
    id: pkulaw
    what: 中国最大法律数据库，法规/案例/期刊
    install: 无CLI，HTTP API（需签约）
    auth:
      required: true
      method: api_key
      env_vars:
        - PKULAW_USERNAME
        - PKULAW_API_KEY
      how_to_get: "api.pkulaw.com 查看接口文档 → 联系销售签约获取API权限"
      pricing: "机构订阅制，年费数万元"
    capabilities:
      - 法律法规检索（中央/地方/部门规章）
      - 司法案例检索（裁判文书）
      - 法学期刊论文
      - 合同范本库
      - 法规关联和时效性标注
    when_to_use:
      - 查找中国法律法规原文
      - 检索类似裁判案例
      - 合规性分析的法律依据
    limits:
      - 付费且价格较高
      - API开放程度有限
    docs: https://www.pkulaw.com/

  - name: 中国裁判文书网爬虫
    id: wenshu-scraper
    what: 爬取中国裁判文书网(wenshu.court.gov.cn)数据
    install: "需自行开发或使用 Bright Data/lightpanda"
    auth:
      required: false
      note: "无官方API，需爬虫方式获取"
    capabilities:
      - 裁判文书全文检索
      - 按法院/案由/当事人/时间筛选
      - 文书详情获取
    when_to_use:
      - 免费获取中国裁判文书
      - 北大法宝的免费替代
    limits:
      - 反爬严格（验证码/IP限制）
      - 数据可能不完整
      - 网站改版频繁
    docs: https://wenshu.court.gov.cn/

  - name: DocuSign SDK
    id: docusign-sdk
    what: 电子签名平台SDK，发合同/收签名/归档（无官方CLI）
    install: pip install docusign-esign  # Python / npm install docusign-esign  # Node.js
    auth:
      required: true
      method: oauth (JWT)
      env_vars:
        - DOCUSIGN_INTEGRATION_KEY
        - DOCUSIGN_USER_ID
        - DOCUSIGN_ACCOUNT_ID
        - DOCUSIGN_PRIVATE_KEY_PATH
      how_to_get: |
        1. developers.docusign.com 创建App
        2. 获取 Integration Key
        3. 生成 RSA 密钥对上传
        4. 管理员同意授权
      verify: "python -c \"import docusign_esign; print('ok')\""
      pricing: "免费5个Envelope/月，付费$10-60/用户/月"
    capabilities:
      - 发送合同签署请求
      - 签署模板管理
      - 签署状态实时查询
      - 已签文档下载/归档
      - 批量发送
      - 签署提醒
    when_to_use:
      - 发合同给对方签字
      - 批量签署（如劳动合同）
      - 跟踪合同签署进度
    limits:
      - 免费版额度少
    docs: https://developers.docusign.com/

  - name: LawGeex API
    id: lawgeex
    what: AI合同审查平台API
    install: 无CLI，HTTP API
    auth:
      required: true
      method: api_key
      env_vars:
        - LAWGEEX_API_KEY
      how_to_get: "lawgeex.com 联系销售获取"
      pricing: 企业级定价
    capabilities:
      - 合同自动审查（标注风险条款）
      - 合规性检查
      - 条款对比（与企业标准对比）
      - 审查报告生成
      - 支持NDA/SaaS/采购等多种合同类型
    when_to_use:
      - 批量合同审查
      - 快速识别高风险条款
      - 新合同与标准模板对比
    limits:
      - 付费且价格高
      - 主要支持英文合同
      - 中文合同效果未验证
    docs: https://www.lawgeex.com/

  - name: Cornell LII (法律数据)
    id: cornell-lii
    what: 康奈尔大学法律信息研究所，美国法律免费资源
    install: "用lightpanda/web_extract爬取"
    auth:
      required: false
    capabilities:
      - 美国联邦法律(USC)全文
      - 联邦法规(CFR)
      - 宪法和修正案
      - 最高法院判例
    when_to_use:
      - 查找美国法律原文
      - 免费替代Westlaw/LexisNexis
    limits:
      - 仅美国法律
      - 无结构化API，需爬取
    docs: https://www.law.cornell.edu/

domain_knowledge:
  terminology:
    NDA: Non-Disclosure Agreement，保密协议
    SLA: Service Level Agreement，服务等级协议
    Indemnification: 赔偿条款
    Liability Cap: 责任上限
    Force Majeure: 不可抗力
    IP Assignment: 知识产权转让
    Non-compete: 竞业禁止
    违约金: Liquidated Damages
    管辖权: Jurisdiction
    仲裁: Arbitration

  rules:
    - 合同审查重点关注：责任上限、赔偿条款、竞业禁止、知识产权归属、管辖权
    - 中国合同纠纷诉讼时效3年（民法典）
    - 劳动合同必须书面签订（中国劳动合同法）
    - 电子签名在中国具有法律效力（电子签名法2019修订）
    - AI生成的法律分析仅供参考，不构成法律意见
    - 涉及跨境的合同注意法律适用条款

  typical_workflows:
    - name: 合同审查
      steps: 收到合同 → AI初审（标注风险条款） → 法务复核 → 反馈修改意见 → 定稿签署
      tools: [lawgeex, docusign-sdk]

    - name: 法规查询
      steps: 收到法律问题 → 检索相关法规 → 查找类似判例 → 生成法律意见初稿
      tools: [pkulaw, courtlistener, cornell-lii]

    - name: 批量签约
      steps: 准备模板 → 填充各方信息 → DocuSign批量发送 → 跟踪签署 → 归档
      tools: [docusign-sdk]
