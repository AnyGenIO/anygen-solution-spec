# 税务/财务合规 — AI 工具说明书

domain: 税务财务
description: 增值税/所得税申报、发票管理、记账对账、全球VAT合规

tools:

  - name: 中国电子税务局 API
    id: etax-cn
    what: 国税局官方接口，申报/查询/发票
    install: 无公开SDK，需通过税局授权对接
    auth:
      required: true
      method: digital_certificate
      env_vars:
        - ETAX_TAXPAYER_ID        # 纳税人识别号
        - ETAX_CERT_PATH          # 数字证书路径
        - ETAX_CERT_PASSWORD      # 证书密码
      how_to_get: |
        1. 向主管税务局申请API对接资质
        2. 获取数字证书
        3. 通常需要通过服务商（航天信息/百望等）接入
    capabilities:
      - 增值税申报
      - 企业所得税申报
      - 发票开具和查验
      - 纳税信用查询
      - 完税证明获取
    when_to_use:
      - 月度/季度税务申报
      - 开具和验证发票
      - 查询纳税记录
    limits:
      - 需要企业资质
      - 直接对接门槛高，通常走服务商
      - 各省系统略有差异
    docs: https://www.chinatax.gov.cn/

  - name: 金蝶云开放平台 API
    id: kingdee-api
    what: 金蝶云星空/精斗云的开放API，财务/进销存/供应链
    install: 无CLI，HTTP API调用
    auth:
      required: true
      method: api_key
      env_vars:
        - KINGDEE_APP_ID
        - KINGDEE_APP_SECRET
        - KINGDEE_ACCT_ID         # 账套ID
      how_to_get: "openapi.open.kingdee.com 注册开发者 → 创建应用"
    capabilities:
      - 凭证录入和查询
      - 科目余额查询
      - 应收应付管理
      - 进销存管理
      - 报表生成（资产负债表/利润表）
      - 费用报销
    when_to_use:
      - 企业用金蝶做账
      - 自动录入凭证
      - 拉财务报表
    limits:
      - 不同版本API覆盖不同（云星空最全）
      - 需要购买金蝶产品
    docs: https://openapi.open.kingdee.com/

  - name: 用友开放平台 API
    id: yonyou-api
    what: 用友U8/NC/YonSuite的开放API
    install: 无CLI，HTTP API调用
    auth:
      required: true
      method: api_key
      env_vars:
        - YONYOU_APP_KEY
        - YONYOU_APP_SECRET
      how_to_get: "developer.yonyou.com → Open API → 注册开发者"
    capabilities:
      - 凭证管理
      - 总账和明细账
      - 应收应付
      - 固定资产
      - 报表
      - 供应链（采购/销售/库存）
    when_to_use:
      - 企业用用友做账
      - 类似金蝶，二选一
    limits:
      - 同金蝶，版本差异大
    docs: https://developer.yonyou.com/openAPI

  - name: Avalara CLI
    id: avalara
    what: 美国税务合规平台，自动计算销售税
    install: pip install Avalara  # AvaTax SDK / 或新版 pip install Avalara.SDK
    auth:
      required: true
      method: api_key
      env_vars:
        - AVALARA_ACCOUNT_ID
        - AVALARA_LICENSE_KEY
      how_to_get: "avalara.com 注册 → Developer Account → 获取License Key"
      pricing: "按交易量计费"
      verify: "curl -u $AVALARA_ACCOUNT_ID:$AVALARA_LICENSE_KEY https://rest.avatax.com/api/v2/utilities/ping"
    capabilities:
      - 销售税自动计算（覆盖美国所有州/县/市）
      - 税率查询
      - 交易记录
      - 税务申报
      - 免税证书管理
      - 跨境交易税务
    when_to_use:
      - 美国电商销售税计算
      - 多州税务合规
      - 与Shopify/Amazon集成的税务
    limits:
      - 主要覆盖美国/加拿大
      - 按交易量计费
    docs: https://developer.avalara.com/

  - name: TaxJar API
    id: taxjar
    what: 电商销售税API（已被Stripe收购）
    install: pip install taxjar
    auth:
      required: true
      method: api_key
      env_vars:
        - TAXJAR_API_TOKEN
      how_to_get: "taxjar.com 注册 → Account → API Token"
      pricing: "Starter $39/月, Professional $99/月（API需Professional计划）"
    capabilities:
      - 销售税计算
      - 税率查询（按地址）
      - 交易报告
      - 自动申报（AutoFile）
      - Nexus判断（哪些州需要缴税）
    when_to_use:
      - 美国电商销售税
      - 判断在哪些州有纳税义务(Nexus)
    limits:
      - 仅美国
      - Stripe收购后可能整合变化
    docs: https://developers.taxjar.com/api/

  - name: Sovos API
    id: sovos
    what: 全球电子发票和VAT合规平台
    install: 无CLI，HTTP API
    auth:
      required: true
      method: api_key
      env_vars:
        - SOVOS_API_KEY
        - SOVOS_CLIENT_ID
      how_to_get: "sovos.com 联系销售获取API凭证"
      pricing: 企业级定价
    capabilities:
      - 全球电子发票（e-invoicing）
      - VAT/GST申报（170+国家）
      - 税务合规检查
      - 实时税务报告
    when_to_use:
      - 跨国企业全球VAT合规
      - 欧盟电子发票要求
      - 多国同时申报
    limits:
      - 企业级产品，价格高
      - 对接周期长
    docs: https://sovos.com/developers/

  - name: 发票OCR (百度/阿里)
    id: invoice-ocr
    what: 发票识别API，自动提取发票信息
    install: pip install baidu-aip  # 百度 / pip install alibabacloud-ocr  # 阿里
    auth:
      required: true
      method: api_key
      env_vars_baidu:
        - BAIDU_OCR_APP_ID
        - BAIDU_OCR_API_KEY
        - BAIDU_OCR_SECRET_KEY
      env_vars_aliyun:
        - ALIBABA_CLOUD_ACCESS_KEY_ID
        - ALIBABA_CLOUD_ACCESS_KEY_SECRET
      how_to_get: |
        百度: ai.baidu.com → 文字识别 → 创建应用
        阿里: ocr.console.aliyun.com → 开通服务
      pricing: "百度免费500次/天，阿里按量计费"
    capabilities:
      - 增值税发票识别（普票/专票/电子票）
      - 火车票/机票/出租车票识别
      - 银行回单识别
      - 通用票据识别
      - 结构化输出（发票号/金额/税额/日期）
    when_to_use:
      - 批量录入发票信息
      - 费用报销自动化
      - 发票真伪校验
    limits:
      - 识别准确率约95-99%
      - 图片质量影响结果
    docs: |
      百度: https://ai.baidu.com/ai-doc/OCR/
      阿里: https://help.aliyun.com/product/252763.html

domain_knowledge:
  terminology:
    增值税: 对商品/服务增值部分征税，中国基本税率13%
    企业所得税: 对企业利润征税，中国基本税率25%
    进项税: 购进货物时支付的增值税（可抵扣）
    销项税: 销售货物时收取的增值税
    VAT: Value Added Tax，增值税（欧洲叫法）
    GST: Goods and Services Tax（澳洲/印度叫法）
    Nexus: 美国概念，在某州有纳税义务的连接点
    e-invoicing: 电子发票
    三流合一: 发票流/资金流/货物流一致

  rules:
    - 增值税一般按月申报（小规模按季）
    - 企业所得税按季预缴，年度汇算清缴
    - 发票必须在开具后180天内认证抵扣
    - 跨境销售需要关注目的国VAT注册义务
    - 美国各州销售税税率不同（0%-10.25%）
    - 欧盟2025年起逐步强制电子发票

  typical_workflows:
    - name: 月度增值税申报
      steps: 汇总销项发票 → 认证进项发票 → 计算应纳税额 → 填报申报表 → 税局提交
      tools: [invoice-ocr, kingdee-api, etax-cn]

    - name: 费用报销
      steps: 员工拍发票 → OCR识别 → 自动填报销单 → 审批 → 入账
      tools: [invoice-ocr, kingdee-api]

    - name: 跨境税务合规
      steps: 判断各国纳税义务 → 注册VAT → 按期申报 → 缴税
      tools: [avalara, sovos]
