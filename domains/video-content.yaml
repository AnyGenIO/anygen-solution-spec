domain: 视频内容
description: 视频处理、AI配音、字幕转写、短视频生成、素材下载、AI视频生成

tools:
  - name: FFmpeg
    id: ffmpeg
    what: 视频处理基础库，剪辑/转码/合并/提取音频
    install: "apt install ffmpeg  # 或 brew install ffmpeg"
    auth:
      required: false
    capabilities:
      - 视频转码（格式转换）
      - 视频剪辑（裁剪/拼接/分割）
      - 音频提取和替换
      - 字幕硬烧
      - 视频压缩
      - 批量处理
    when_to_use:
      - 视频格式转换
      - 提取音频轨道
      - 批量压缩视频
    limits:
      - 纯命令行，无GUI
      - 参数复杂，学习曲线陡
    docs: https://www.ffmpeg.org/documentation.html

  - name: Whisper (OpenAI)
    id: whisper
    what: 语音转字幕/转写，支持多语言，本地可跑
    install: pip install openai-whisper
    auth:
      required: false
    capabilities:
      - 语音转文字（98种语言）
      - 字幕文件生成（SRT/VTT）
      - 时间戳对齐
      - 本地离线运行
    when_to_use:
      - 视频自动加字幕
      - 会议录音转文字
      - 多语言内容转写
    limits:
      - 大模型需要GPU（large模型约10GB显存）
      - 长音频处理较慢
    docs: https://github.com/openai/whisper

  - name: ElevenLabs
    id: elevenlabs
    what: AI配音/TTS，支持多语言多音色，效果接近真人
    install: pip install elevenlabs
    auth:
      required: true
      method: api_key
      env_vars:
        - ELEVENLABS_API_KEY
      how_to_get: "elevenlabs.io → Profile → API Key"
    capabilities:
      - 文字转语音（29种语言）
      - 语音克隆
      - 实时流式TTS
      - 音色定制
    when_to_use:
      - 视频AI配音
      - 多语言内容本地化
      - 有声内容生成
    limits:
      - 免费版每月1万字符
      - 付费$5-99/月
    docs: https://elevenlabs.io/docs/api-reference/introduction

  - name: MoneyPrinterTurbo
    id: moneyprinterturbo
    what: 一键生成短视频(54k stars)，自动脚本+素材+配音+字幕
    install: |
      git clone https://github.com/harry0703/MoneyPrinterTurbo
      pip install -r requirements.txt
    auth:
      required: false
    capabilities:
      - 自动生成视频脚本
      - 自动搜索匹配素材
      - 自动AI配音
      - 自动添加字幕
      - 一键输出成品视频
    when_to_use:
      - 批量生成带货/种草短视频
      - 自媒体内容批量生产
    limits:
      - 需要配置LLM API Key（用于生成脚本）
      - 素材质量取决于搜索源
    docs: https://github.com/harry0703/MoneyPrinterTurbo

  - name: yt-dlp
    id: yt-dlp
    what: 视频素材下载(170k stars)，支持1000+网站
    install: pip install yt-dlp
    auth:
      required: false
    capabilities:
      - 下载YouTube/Bilibili/TikTok等1000+网站视频
      - 选择画质/格式
      - 下载字幕
      - 批量下载
      - 提取音频
    when_to_use:
      - 下载竞品视频素材分析
      - 下载参考内容
    limits:
      - 部分网站可能需要登录Cookie
      - 注意版权合规
    docs: https://github.com/yt-dlp/yt-dlp

  - name: Runway
    id: runway
    what: AI视频生成，文字/图片转视频
    install: 无CLI，REST API调用
    auth:
      required: true
      method: api_key
      env_vars:
        - RUNWAY_API_KEY
      how_to_get: "dev.runwayml.com 注册获取API Key"
    capabilities:
      - 文字生成视频（Text-to-Video）
      - 图片生成视频（Image-to-Video）
      - 视频风格转换
      - 视频扩展（延长时长）
    when_to_use:
      - 生成创意视频素材
      - 产品展示视频
    limits:
      - 付费使用（按秒计费）
      - 生成时间较长
      - API有限开放
    docs: https://docs.dev.runwayml.com/
