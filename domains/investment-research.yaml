# 投研/金融分析 — AI 工具说明书

domain: 投研金融
description: 股票/基金/宏观数据获取、研报生成、组合监控、交易执行

tools:

  - name: OpenBB Terminal
    id: openbb
    what: 开源金融终端，CLI版Bloomberg，覆盖股票/ETF/外汇/加密/宏观
    install: pip install openbb-cli  # CLI / pip install openbb  # Python SDK（两个分开的包）
    auth:
      required: false              # 基础功能免费，高级数据源需key
      optional_keys:
        - OPENBB_API_KEY           # OpenBB Hub高级功能
        - POLYGON_API_KEY          # 美股实时数据
        - FRED_API_KEY             # 美联储宏观数据
        - INTRINIO_API_KEY         # 基本面数据
      how_to_get: "各数据源官网注册，openbb.co/hub 管理密钥"
    capabilities:
      - 股票行情和历史数据
      - 财务报表（Income/Balance/Cashflow）
      - 技术分析指标
      - 期权链和希腊值
      - 宏观经济数据（GDP/CPI/利率）
      - ETF持仓和分析
      - 加密货币数据
      - 新闻和情绪分析
      - 投资组合分析
    when_to_use:
      - 全方位金融数据查询
      - 技术面/基本面分析
      - 宏观经济研究
      - 想要一个统一的金融数据入口
    limits:
      - 免费数据有延迟（15-20分钟）
      - 实时数据需要付费数据源
    docs: https://docs.openbb.co/

  - name: AkShare
    id: akshare
    what: 中国A股/港股/期货/基金数据，Python库，完全免费
    install: pip install akshare
    auth:
      required: false
    capabilities:
      - A股/港股实时和历史行情
      - 财务报表
      - 基金净值和持仓
      - 期货行情
      - 宏观经济指标（中国）
      - 板块和概念数据
      - 龙虎榜/融资融券
      - 北向资金
    when_to_use:
      - 研究A股/港股
      - 获取中国宏观经济数据
      - 基金分析
    limits:
      - 数据来自公开源，偶尔接口变动
      - 无实时推送
    docs: https://akshare.akfamily.xyz/

  - name: Tushare Pro
    id: tushare
    what: A股数据接口，Pro版数据更全，有积分制度
    install: pip install tushare
    auth:
      required: true
      method: token
      env_vars:
        - TUSHARE_TOKEN
      how_to_get: "tushare.pro 注册 → 个人中心获取token"
      pricing: "基础免费（有积分限制），高级数据需要高积分"
    capabilities:
      - A股日/周/月K线
      - 财务数据
      - 基金/期货/可转债
      - 概念/行业分类
      - 机构调研数据
    when_to_use:
      - 需要稳定的A股历史数据
      - 回测需要较长历史数据
    limits:
      - 积分制度限制调用频率和数据范围
      - 高级数据需要高积分（充值或社区贡献）
    docs: https://tushare.pro/document/1

  - name: yfinance
    id: yfinance
    what: Yahoo Finance 非官方Python库，全球股票数据，免费
    install: pip install yfinance
    auth:
      required: false
    capabilities:
      - 全球股票行情（美股/港股/A股等）
      - 历史K线数据
      - 财务报表
      - 机构持仓
      - 期权链
      - 股息历史
    when_to_use:
      - 快速获取美股数据
      - 全球市场概览
      - 简单的数据分析和回测
    limits:
      - 非官方API，Yahoo可能随时封
      - 数据有延迟
      - 频繁调用可能被限
    docs: https://github.com/ranaroussi/yfinance

  - name: Valyu Python SDK
    id: valyu-sdk
    what: AI搜索API，覆盖金融数据（SEC文件/市场数据）及36+数据源
    install: pip install valyu
    auth:
      required: true
      method: api_key
      env_vars:
        - VALYU_API_KEY
      how_to_get: "valyu.network 注册获取"
    capabilities:
      - 美股实时和历史行情
      - 深度市场数据（Level 2）
      - 完整基本面数据
      - SEC文件检索
      - 新闻和分析
    when_to_use:
      - 需要高质量美股数据
      - 深度分析美股个股
    limits:
      - 主要覆盖美股
    docs: https://docs.valyu.ai/

  - name: TradingAgents
    id: trading-agents
    what: 多角色金融AI Agent框架（44K+ stars），模拟分析师/交易员/风控
    install: |
      git clone https://github.com/TauricResearch/TradingAgents
      pip install -r requirements.txt
    auth:
      required: true
      method: api_key
      env_vars:
        - OPENAI_API_KEY          # LLM驱动
        - POLYGON_API_KEY         # 市场数据
      how_to_get: "各服务官网注册"
    capabilities:
      - 多Agent协作分析（牛方/熊方/研究员/交易员/风控）
      - 基本面分析
      - 技术面分析
      - 新闻情绪分析
      - 交易信号生成
      - 风险评估
    when_to_use:
      - 想要AI生成多角度投研报告
      - 模拟投资决策流程
    limits:
      - LLM调用成本
      - 不能直接执行交易
      - 投资建议仅供参考
    docs: https://github.com/TauricResearch/TradingAgents

domain_knowledge:
  terminology:
    PE: 市盈率 = 股价/每股收益
    PB: 市净率 = 股价/每股净资产
    ROE: 净资产收益率
    EPS: 每股收益
    Alpha: 超额收益
    Beta: 系统性风险系数
    Sharpe: 夏普比率 = 超额收益/波动率
    Drawdown: 最大回撤
    AUM: 管理资产规模
    K线: 蜡烛图（开高低收）
    均线: 移动平均线（MA5/MA10/MA20/MA60）
    北向资金: 通过沪港通/深港通买A股的外资

  rules:
    - A股交易时间 9:30-11:30 13:00-15:00（北京时间）
    - 美股交易时间 9:30-16:00（东部时间），盘前4:00盘后20:00
    - A股T+1交易，美股T+0
    - A股涨跌停±10%（科创板±20%，ST股±5%）
    - 数据分析不构成投资建议
    - 回测结果不代表未来表现

  typical_workflows:
    - name: 个股研究
      steps: 拉行情和财务数据 → 技术面分析 → 基本面分析 → 行业对比 → 生成研报
      tools: [openbb, akshare, yfinance]

    - name: 市场监控
      steps: 定时拉行情 → 检查异动（涨跌幅/成交量） → 生成日报 → 推送
      tools: [akshare, yfinance]

    - name: 投资决策
      steps: TradingAgents多角度分析 → 生成买卖建议 → 人工审核 → 执行
      tools: [trading-agents, openbb]
