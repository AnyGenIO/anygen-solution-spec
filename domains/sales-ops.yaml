    id: gmail-api
    what: Google Gmail API，销售从自己Gmail发邮件（更个人化，送达率高）
    install: pip install google-api-python-client google-auth google-auth-oauthlib
    auth:
      required: true
      method: oauth (OAuth 2.0 or Service Account)
      env_vars:
        - GOOGLE_APPLICATION_CREDENTIALS  # Service Account JSON路径
      how_to_get: |
        1. Google Cloud Console → APIs & Services → Enable Gmail API
        2. Credentials → Create OAuth Client ID 或 Service Account
        3. OAuth需用户授权，Service Account需Domain-wide Delegation
      verify: "python quickstart.py（官方示例代码）"
    capabilities:
      - 发送邮件（从个人Gmail地址）
