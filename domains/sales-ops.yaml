    auth:
      required: true
      method: oauth (Service Account或OAuth 2.0)
      env_vars:
        - GOOGLE_APPLICATION_CREDENTIALS  # Service Account JSON路径
      how_to_get: "Google Cloud Console → APIs & Services → Credentials → Create Service Account"
      pricing: "Google Workspace Business Standard $12/用户/月起（含Meet）"
    capabilities:
      - 通过Calendar API创建带Meet链接的会议
      - 获取会议详情
      - 录制管理（需Google Workspace Enterprise）
      - 参会者报告（需Enterprise）
    when_to_use:
