    limits:
      - 免费版单步Zap+100 tasks/月
      - 复杂逻辑能力有限
      - 每个动作算1个task（成本可能高）
    docs: https://platform.zapier.com/

  - name: Make (Integromat) API
    id: make-api
    what: 可视化集成自动化平台（Zapier竞品，更强大的逻辑控制）
    install: 无CLI，HTTP API调用（主要用Web界面）
    auth:
      required: true
