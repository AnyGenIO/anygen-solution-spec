      how_to_get: "Make → Profile → API → Generate token"
      pricing: "Free版1000 operations/月 / Core $10.59/月10k ops / Pro $18.82/月10k ops"
    capabilities:
      - 可视化工作流（Scenario）
      - 高级路由和过滤（比Zapier强）
      - 错误处理和重试
      - 数据存储（临时存储变量）
      - Webhooks和HTTP请求
      - 2000+应用集成
      - 复杂数据转换（JSON/Array操作）
    when_to_use:
      - 需要复杂条件逻辑（if-else/loop）
      - Zapier功能不够用
      - 预算有限（比Zapier便宜）
    limits:
