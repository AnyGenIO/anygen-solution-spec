# 销售运营（SalesOps/RevOps）— AI 工具说明书

domain: 销售运营
description: SDR线索拓展、AE跟单成交、RevOps数据分析，覆盖找人→触达→跟进→签约全链路

tools:

  # ============================================================
  # CRM 平台
  # ============================================================

  - name: Salesforce CLI (sf)
    id: salesforce-cli
    what: Salesforce 官方命令行，管理org/数据/部署，业务操作走REST API（覆盖Sales/Service/Marketing Cloud全生态）
    install: npm install -g @salesforce/cli
    auth:
      required: true
      method: oauth
      setup: sf org login web   # 浏览器授权
      env_vars:
        - SF_ACCESS_TOKEN       # CI场景
        - SF_INSTANCE_URL       # 如 https://yourorg.my.salesforce.com
      how_to_get: "Setup → Apps → Connected Apps → 创建OAuth App"
      verify: sf org list
    capabilities:
      # Sales Cloud 核心
      - SOQL 查询（Lead/Contact/Opportunity/Account/Task/Event 全对象）
      - 记录CRUD（创建/更新Lead、推进Opportunity Stage、记录Activity）
      - 报表和Dashboard导出
      - 数据批量导入导出（Bulk API 2.0，百万级数据）
      - 重复数据检测和合并
      # Service Cloud
      - Case管理（工单创建/分配/升级）
      - Knowledge Base文章操作
      - Omni-Channel路由配置
      # Marketing Cloud（需单独授权）
      - Journey Builder自动化流程
      - Email Studio邮件发送和追踪
      - Audience Studio（CDP）数据管理
      # 自动化和AI
      - Flow自动化（可视化工作流）
      - Einstein AI（Lead/Opportunity Scoring，见salesforce-einstein工具）
      - Apex代码部署（自定义逻辑）
      # 扩展和集成
      - AppExchange应用安装（CPQ/DocuSign/Gong等3000+应用）
      - REST/SOAP API调用（几乎所有功能可编程）
      - 元数据管理（部署自定义对象/字段/Flow）
      - Sandbox管理（测试环境）
    when_to_use:
      - 查询/更新CRM中的线索、商机、客户、工单
      - 批量导入线索（CSV/Excel→Salesforce）
      - 推进商机阶段（Stage），记录通话/会议Activity
      - 拉漏斗报表和预测
      - 自动化复杂业务流程（Flow/Apex）
      - 与其他系统集成（双向数据同步）
    limits:
      - API调用日限额（Professional 1000次/天，Enterprise 10万次/天，Unlimited 25万次/天）
      - Bulk API单批1万条记录
      - 数据存储按版本限额（Enterprise 120MB+1GB/用户）
      - Marketing Cloud需单独订阅
    docs: https://developer.salesforce.com/docs/atlas.en-us.sfdx_cli_reference.meta/sfdx_cli_reference/

  - name: HubSpot CLI
    id: hubspot-cli
    what: HubSpot 官方命令行（偏开发部署），业务数据走REST API（全Hubs功能：Marketing/Sales/Service/CMS/Operations）
    install: npm install -g @hubspot/cli
    auth:
      required: true
      method: api_key / oauth
      env_vars:
        - HUBSPOT_ACCESS_TOKEN    # Private App Token（推荐）
      how_to_get: "HubSpot → Settings → Integrations → Private Apps → Create（需配置Scopes）"
      verify: "curl -H 'Authorization: Bearer $HUBSPOT_ACCESS_TOKEN' https://api.hubapi.com/crm/v3/objects/contacts?limit=1"
    capabilities:
      # Sales Hub
      - 联系人/公司/交易/票据 CRUD（CRM Objects API）
      - 管道(Pipeline)和阶段自定义
      - 邮件跟踪（打开/点击）
      - 邮件序列（Sequences）自动化
      - 通话记录和录音
      - 会议预约（Meetings工具）
      - Sales Analytics和预测
      # Marketing Hub
      - 表单和落地页管理
      - 邮件营销（Marketing Email）
      - 工作流自动化（Workflows，类似Salesforce Flow）
      - Lead评分（Lead Scoring）
      - 广告管理（Facebook/Google Ads ROI追踪）
      - SEO优化建议
      # Service Hub
      - 工单（Ticket）管理
      - 知识库（Knowledge Base）
      - 客户反馈调查（NPS/CSAT）
      - 实时聊天（Live Chat）
      - 聊天机器人（Chatbot Builder）
      # CMS Hub
      - 网站页面和博客管理
      - 内容优化（SEO/A/B测试）
      - 会员登录和个性化
      # Operations Hub
      - 数据同步（双向同步Salesforce/其他系统）
      - 数据质量自动化（去重/格式化）
      - 可编程自动化（Custom Code Workflows）
      - Webhooks（事件驱动集成）
      # 扩展
      - HubSpot App Marketplace（1000+集成）
      - 自定义对象（Custom Objects，类似Salesforce）
      - HubDB（内容数据库，存储结构化数据）
    when_to_use:
      - 中小企业一体化CRM+营销+服务（比Salesforce便宜且易用）
      - Inbound营销策略（内容+SEO+Lead Nurturing）
      - 创建/更新联系人和交易
      - 营销自动化（邮件培育/Lead评分）
      - 客服工单和知识库
      - 网站和落地页一站式管理
    limits:
      - 免费版功能受限（最多1个Dashboard，无工作流自动化，邮件发送有HubSpot品牌）
      - API限流 100次/10秒（Private App），150次/10秒（OAuth）
      - 高级功能需Professional/Enterprise版（$800-$3,600/月起）
      - 与Salesforce比：企业级高级功能弱（如CPQ需第三方）
    docs: https://developers.hubspot.com/docs/api/overview


  - name: Salesforce MCP Server
    id: salesforce-mcp
    what: 社区 MCP Server，AI Agent 直接操作 Salesforce CRM，339+ stars
    install: |
      git clone https://github.com/benitomartin/salesforce-mcp-server
      pip install -r requirements.txt
    auth:
      required: true
      method: oauth
      env_vars:
        - SF_ACCESS_TOKEN
        - SF_INSTANCE_URL
      how_to_get: "同 Salesforce CLI OAuth 流程"
    capabilities:
      - 通过 MCP 协议操作 Contacts/Opportunities/Leads
      - SOQL 查询
      - 记录 CRUD
      - AI Agent 直接调用（无需写代码）
    when_to_use:
      - 已有 MCP 兼容的 AI Agent
      - 想让 AI 直接操作 Salesforce
    limits:
      - 社区项目，功能覆盖不如官方 API 全
      - 活跃维护中
    docs: https://github.com/benitomartin/salesforce-mcp-server

  # ============================================================
  # 通讯触达
  # ============================================================

  - name: Aircall API
    id: aircall-api
    what: 云呼叫中心，销售团队共享电话系统（比Twilio更完整的Sales场景方案）
    install: 无CLI，HTTP API调用
    auth:
      required: true
      method: api_key (Basic Auth)
      env_vars:
        - AIRCALL_API_ID
        - AIRCALL_API_TOKEN
      how_to_get: "Aircall → Settings → Integrations → API Keys"
      pricing: "Essentials $30/用户/月 / Professional $50/用户/月 / Custom需联系"
    capabilities:
      - 共享号码池（团队共用销售号码）
      - 智能呼叫分配（Round Robin/技能路由）
      - 通话录音和转录
      - IVR（自动语音应答）
      - 呼叫标签和备注
      - 与CRM深度集成（Salesforce/HubSpot，通话自动记录）
      - 实时监控（Manager监听/介入通话）
      - Analytics（接通率/通话时长/队列等待）
    when_to_use:
      - 销售团队需要统一电话系统（非个人手机）
      - 需要通话录音和质量监控
      - Manager要实时看团队拨打情况
      - 与CRM自动同步通话记录
    limits:
      - 按席位月费+通话分钟费
      - 主要覆盖欧美号码
    docs: https://developer.aircall.io/api-references/

  - name: Twilio CLI
    id: twilio-cli
    what: Twilio 官方CLI，打电话、发短信、管号码，最像真正的CLI工具
    install: npm install -g twilio-cli
    auth:
      required: true
      method: api_key
      setup: twilio login    # 交互式输入SID和Token
      env_vars:
        - TWILIO_ACCOUNT_SID
        - TWILIO_AUTH_TOKEN
      how_to_get: "twilio.com → Console → Account SID 和 Auth Token 在首页"
      verify: twilio api:core:accounts:fetch
    capabilities:
      - 发送短信/彩信
      - 拨打电话（可接TTS或录音）
      - 购买和管理电话号码
      - 查看通话/短信记录
      - WhatsApp消息发送
      - 号码路由配置
    when_to_use:
      - SDR批量短信触达
      - 自动拨打跟进电话
      - 设置电话转接/IVR
      - 发送WhatsApp消息
    limits:
      - 按用量计费（短信$0.0079/条，通话$0.014/分钟起）
      - 需要购买号码（$1-2/月/号码）
      - 批量短信需要注册Campaign
    docs: https://www.twilio.com/docs/twilio-cli

  # ============================================================
  # 线索获取
  # ============================================================

  - name: Apollo.io API
    id: apollo-api
    what: SDR找人利器，2.75亿联系人数据库，找邮箱/电话/公司信息
    install: 无CLI，HTTP API调用
    auth:
      required: true
      method: api_key
      env_vars:
        - APOLLO_API_KEY
      how_to_get: "app.apollo.io → Settings → Integrations → API Keys"
      pricing: "Free版 / Basic $49/用户/月 / Professional $79/用户/月 / Organization $119/用户/月"
    capabilities:
      - 按公司/职位/行业/地区搜索联系人
      - 获取邮箱和电话号码
      - 公司信息查询（规模/融资/技术栈）
      - 邮箱验证
      - 联系人列表管理
      - 序列化邮件发送
    when_to_use:
      - 找目标客户的联系方式
      - 批量获取某行业/职位的联系人
      - 验证邮箱有效性
      - 建立外呼名单
    limits:
      - 免费版额度很少
      - 数据准确率约85-90%
    docs: https://apolloio.github.io/apollo-api-docs/


  - name: Clearbit API
    id: clearbit-api
    what: 公司信息补全和富化（Enrichment），自动填充公司规模/行业/技术栈等
    install: pip install clearbit
    auth:
      required: true
      method: api_key
      env_vars:
        - CLEARBIT_API_KEY
      how_to_get: "clearbit.com 注册获取（已被 HubSpot 收购，部分功能免费）"
    capabilities:
      - 公司信息补全（规模/行业/融资/技术栈/社交媒体）
      - 联系人信息补全（职位/LinkedIn/邮箱）
      - 公司搜索（按条件筛选目标公司）
      - 网站访客识别（Reveal）
    when_to_use:
      - CRM 数据补全（线索进来后自动填字段）
      - 判断 ICP 匹配度
      - 配合 Apollo 做更精准的目标筛选
    limits:
      - HubSpot 收购后免费额度有限
      - 主要覆盖欧美公司
    docs: https://dashboard.clearbit.com/docs

  - name: LinkedIn Sales Navigator API
    id: linkedin-sales-nav
    what: LinkedIn 销售导航器，精准找决策人和目标客户
    install: 无CLI，HTTP API（需企业版订阅 + 开发者申请）
    auth:
      required: true
      method: oauth
      env_vars:
        - LINKEDIN_CLIENT_ID
        - LINKEDIN_CLIENT_SECRET
        - LINKEDIN_ACCESS_TOKEN
      how_to_get: |
        1. developer.linkedin.com 创建 App
        2. 申请 Sales Navigator API 权限（需企业版）
        3. OAuth 2.0 授权获取 Access Token
      pricing: "Sales Navigator Core $99/月起，API 需企业级"
    capabilities:
      - 高级人脉搜索（按职位/公司/行业/地区）
      - 目标客户列表管理
      - InMail 消息
      - 查看目标客户的动态和互动
      - CRM 同步（Salesforce/HubSpot）
    when_to_use:
      - 找高管/决策人的联系方式和背景
      - 判断目标客户的兴趣和近期动态
      - 配合 Apollo 做多渠道线索挖掘
    limits:
      - API 访问门槛高（需企业版 + 开发者审批）
      - 限流较严
      - 大部分操作建议浏览器自动化
    docs: https://learn.microsoft.com/en-us/linkedin/sales/

  # ============================================================
  # 序列化触达
  # ============================================================

  - name: Outreach API
    id: outreach-api
    what: 销售自动化平台API，序列化邮件/电话/LinkedIn触达
    install: 无CLI，HTTP API调用
    auth:
      required: true
      method: oauth
      env_vars:
        - OUTREACH_CLIENT_ID
        - OUTREACH_CLIENT_SECRET
        - OUTREACH_ACCESS_TOKEN
      how_to_get: "app.outreach.io → Settings → API → OAuth Applications"
      pricing: 起步$100/用户/月（需联系销售）
    capabilities:
      - 创建和管理触达序列（Sequence）
      - 邮件模板管理
      - 任务分配和跟进提醒
      - 通话记录和分析
      - 与CRM双向同步
      - 邮件打开/点击追踪
    when_to_use:
      - 设计多步骤触达序列（Day1邮件→Day3跟进→Day7电话）
      - 批量个性化邮件发送
      - 跟踪触达效果
    limits:
      - 付费工具，价格较高
      - API限流 10,000次/小时/用户
    docs: https://api.outreach.io/api/v2/docs

  - name: Salesloft API
    id: salesloft-api
    what: Outreach的竞品，功能类似，序列化销售触达
    install: 无CLI，HTTP API调用
    auth:
      required: true
      method: oauth
      env_vars:
        - SALESLOFT_API_KEY
      how_to_get: "app.salesloft.com → Settings → API → Generate Key"
      pricing: 需联系销售
    capabilities:
      - 节奏(Cadence)管理——多步骤触达序列
      - 邮件发送和追踪
      - 通话拨号器
      - CRM同步
      - 分析和报表
    when_to_use:
      - 与Outreach二选一，功能类似
      - 企业已用Salesloft时
    limits:
      - API限流 600次/分钟
    docs: https://developers.salesloft.com/docs/api/

  # ============================================================
  # 合同签署
  # ============================================================

  - name: DocuSign SDK
    id: docusign-sdk
    what: 电子签名平台SDK，发送合同/收集签名（无官方CLI）
    install: pip install docusign-esign  # Python / npm install docusign-esign  # Node.js
    auth:
      required: true
      method: oauth (JWT)
      env_vars:
        - DOCUSIGN_INTEGRATION_KEY
        - DOCUSIGN_USER_ID
        - DOCUSIGN_ACCOUNT_ID
        - DOCUSIGN_PRIVATE_KEY_PATH
      how_to_get: |
        1. developers.docusign.com 创建App
        2. 获取 Integration Key
        3. 生成 RSA 密钥对
        4. 管理员同意授权
      verify: "python -c \"import docusign_esign; print('ok')\""
    capabilities:
      - 发送签署请求（Envelope）
      - 模板管理
      - 签署状态查询
      - 已签文档下载
      - 批量发送
    when_to_use:
      - AE发合同给客户签署
      - 跟踪合同签署进度
      - 签署完成后归档
    limits:
      - 免费版每月5个Envelope
      - 付费$10-60/用户/月
    docs: https://developers.docusign.com/docs/esign-rest-api/

  # ============================================================
  # 支付/账单
  # ============================================================

  - name: Stripe CLI
    id: stripe-cli
    what: Stripe 官方CLI，管理支付、订阅、发票
    install: |
      # macOS
      brew install stripe/stripe-cli/stripe
      # Linux
      curl -s https://packages.stripe.dev/api/security/keypair/stripe-cli-gpg/public | gpg --dearmor | sudo tee /usr/share/keyrings/stripe.gpg
    auth:
      required: true
      method: api_key
      setup: stripe login    # 浏览器授权
      env_vars:
        - STRIPE_API_KEY     # sk_live_xxx 或 sk_test_xxx
      how_to_get: "dashboard.stripe.com → Developers → API keys"
      verify: stripe config --list
    capabilities:
      - 创建和管理客户(Customer)
      - 创建支付链接(Payment Link)
      - 发送发票(Invoice)
      - 订阅管理(Subscription)
      - 查看支付记录
      - Webhook监听和调试
      - 报价单(Quote)生成
    when_to_use:
      - 给客户发账单/发票
      - 设置订阅收费
      - 生成报价→合同→收费联动
      - 调试支付集成
    limits:
      - 交易手续费2.9%+$0.30
      - 免费使用API
    docs: https://stripe.com/docs/stripe-cli

  # ============================================================
  # 会话智能/通话分析
  # ============================================================

  - name: Gong API
    id: gong-api
    what: 会话智能平台，录音转文字+AI分析（竞争对手提及/客户痛点/风险信号）
    install: 无CLI，HTTP API调用
    auth:
      required: true
      method: api_key
      env_vars:
        - GONG_ACCESS_KEY
        - GONG_ACCESS_KEY_SECRET
      how_to_get: "Gong → Settings → API → Create Access Key"
      pricing: 企业版定价需联系销售
    capabilities:
      - 自动录制和转录销售电话/会议
      - AI分析关键话题（竞品/痛点/预算/时间线）
      - 提取Action Items和承诺
      - 销售话术分析（talk ratio/问题质量）
      - Deal风险预警
      - 最佳实践话术库
      - CRM自动同步（通话记录和洞察）
    when_to_use:
      - Demo/Discovery Call后自动生成总结
      - 识别客户提到的竞争对手
      - 新销售入职Coaching（听优秀录音学习）
      - 追踪客户多次通话的态度变化
    limits:
      - 仅企业版可用API
      - 录音需要合规告知（GDPR/各地录音法规）
    docs: https://help.gong.io/hc/en-us/sections/360007505537-API-Documentation

  - name: Chorus.ai by ZoomInfo
    id: chorus-ai
    what: 对话智能平台（ZoomInfo旗下），功能类似Gong，侧重ZoomInfo数据联动
    install: 无CLI，HTTP API调用
    auth:
      required: true
      method: oauth
      env_vars:
        - CHORUS_API_KEY
      how_to_get: "Chorus → Settings → API Access（需管理员开通）"
      pricing: 需ZoomInfo订阅，联系销售
    capabilities:
      - 通话录音和转录
      - AI提取客户需求/异议/竞品
      - 销售行为分析（提问/倾听比例）
      - Deal Tracker（追踪商机进展信号）
      - 自动生成Call Summary
      - 与ZoomInfo联系人数据打通
    when_to_use:
      - 已用ZoomInfo时的配套选择
      - 类Gong需求但预算考虑
    limits:
      - API功能不如Gong完善
      - 需ZoomInfo生态绑定
    docs: https://support.chorus.ai/hc/en-us/categories/360003040054-API

  # ============================================================
  # CPQ/报价配置
  # ============================================================

  - name: Salesforce CPQ
    id: salesforce-cpq
    what: Salesforce原生报价配置工具，处理复杂定价（折扣规则/产品组合/审批流）
    install: 无独立CLI，通过Salesforce CLI操作
    auth:
      required: true
      method: oauth
      env_vars:
        - SF_ACCESS_TOKEN
        - SF_INSTANCE_URL
      how_to_get: "同Salesforce CLI，需安装CPQ License"
      pricing: $75-150/用户/月（需Enterprise版以上）
    capabilities:
      - 产品目录和价格表管理
      - 报价单生成（支持多币种/多层级折扣）
      - 产品配置规则（Bundle/选配/互斥）
      - 审批工作流（超折扣需审批）
      - 续约和增购管理
      - 报价→订单→发票自动流转
      - 与Salesforce CRM深度集成
    when_to_use:
      - 产品SKU多且定价复杂（如SaaS分层+席位+模块）
      - 需要多层级审批（AE→经理→VP）
      - 年度续约和扩展场景
      - 企业级B2B报价
    limits:
