    what: 视频会议API，销售Demo/Discovery Call自动化（录制/转录/集成CRM）
    install: pip install zoom-python  # 非官方但好用的SDK
    auth:
      required: true
      method: oauth / JWT (Server-to-Server OAuth推荐)
      env_vars:
        - ZOOM_ACCOUNT_ID
        - ZOOM_CLIENT_ID
        - ZOOM_CLIENT_SECRET
      how_to_get: "Zoom App Marketplace → Develop → Build App → Server-to-Server OAuth"
      pricing: "Basic免费 / Pro $149/年/用户 / Business $199/年/用户"
    capabilities:
      - 创建和管理会议
      - 获取会议录制（云录制MP4/音频）
      - 获取转录文本（需Professional版以上）
      - 参会者报告（谁参加了/参与时长）
      - 会议注册管理（Webinar场景）
      - 云录制下载
