domain_knowledge:
  terminology:
    # 角色和职能
    SDR: Sales Development Representative，负责线索挖掘和初步触达
    BDR: Business Development Representative，SDR的另一种叫法，有时特指Outbound
    AE: Account Executive，负责跟单成交
    CSM: Customer Success Manager，客户成功经理（续约/扩展/健康度）
    AM: Account Manager，客户经理（类似CSM，偏维护关系）
    RevOps: Revenue Operations，收入运营（数据/流程/工具统一优化）
    Sales Engineer: 售前技术支持（复杂产品的Demo和POC）

    # 线索和客户分级
    MQL: Marketing Qualified Lead，市场合格线索（营销打分达标）
    SQL: Sales Qualified Lead，销售合格线索（SDR验证有购买意向）
    SAL: Sales Accepted Lead，销售接受线索（AE确认跟进）
    PQL: Product Qualified Lead，产品合格线索（试用后达到激活标准，PLG场景）
    ICP: Ideal Customer Profile，理想客户画像（公司规模/行业/痛点）
    Buyer Persona: 购买者人设（角色/职位/痛点/决策权）

    # 销售流程和方法论
    Pipeline: 销售管道/漏斗
    Stage: 商机阶段（如Discovery→Demo→Proposal→Negotiation→Closed Won）
    BANT: Budget Authority Need Timeline，经典资格判断框架
    MEDDIC: Metrics Economic-buyer Decision-criteria Decision-process Identify-pain Champion，复杂销售资格框架
    SPICED: Situation Problem Implication Critical-event Decision，Winning by Design提出的现代框架
    Cadence/Sequence: 序列化触达（多步骤自动跟进）
    Discovery Call: 发现通话（了解痛点和需求）
    Demo: 产品演示
    POC: Proof of Concept，概念验证（试用/试点）
    Objection Handling: 异议处理（价格太贵/已有竞品等）
    Mutual Action Plan (MAP): 双方行动计划（买卖双方共同认可的成交里程碑）

    # 收入指标
    ARR: Annual Recurring Revenue，年度经常性收入（SaaS核心指标）
    MRR: Monthly Recurring Revenue，月度经常性收入
    NRR: Net Revenue Retention，净收入留存率（续约+扩展-流失，>100%说明扩展强）
    GRR: Gross Revenue Retention，总收入留存率（仅续约，不含扩展）
    ACV: Annual Contract Value，年度合同价值（单个合同的年化金额）
    TCV: Total Contract Value，合同总价值（多年合同总额）
    ASP: Average Selling Price，平均客单价
    Win Rate: 成单率（Closed Won / 总商机数）
    Sales Cycle: 销售周期（从SQL到Closed Won的平均天数）
    LTV: Lifetime Value，客户生命周期价值
    CAC: Customer Acquisition Cost，客户获取成本
    CAC Payback: CAC回收期（几个月收回获客成本）

    # 管道管理
    Pipeline Coverage: 管道覆盖率（Pipeline总额 / 目标，一般需要3-4x）
    Weighted Pipeline: 加权管道（各Stage金额 × 成单概率）
    Slipped Deal: 滑期商机（预计本月关但推迟了）
    Stale Deal: 僵尸商机（长期无活动）
    Commit/Best Case/Pipeline: 预测类别（Commit=高确定性，Best Case=乐观，Pipeline=全部）

    # GTM策略
    ABM: Account-Based Marketing，基于账户的营销（优先攻大客户）
    PLG: Product-Led Growth，产品驱动增长（免费试用→自助转化）
    SLG: Sales-Led Growth，销售驱动增长（传统企业销售）
    Inbound: 入站营销（客户主动来）
    Outbound: 出站销售（主动找客户）
    Land and Expand: 先小单进入，再扩展（先卖1个部门，再卖全公司）
    Upsell: 向上销售（买更贵的版本）
    Cross-sell: 交叉销售（买其他产品）
    Expansion: 扩展（增加席位/模块）
    Churn: 流失（客户不续约）

    # 工具和技术
    CRM: Customer Relationship Management，客户关系管理系统
    CPQ: Configure Price Quote，配置定价报价（处理复杂产品组合）
    Sales Engagement Platform: 销售触达平台（Outreach/Salesloft）
    Conversation Intelligence: 会话智能（Gong/Chorus，录音分析）
    Intent Data: 意图数据（谁在研究你的产品类别）
    Data Enrichment: 数据富化（自动补全公司/联系人信息）
    Deal Room: 交易室（买卖双方协作空间，PandaDoc/DealHub）
    Sales Playbook: 销售剧本（标准化流程和最佳实践）

  rules:
    # 邮件触达
    - 冷邮件第一封不要超过150字，要有明确CTA（打电话/回复/看Demo视频）
    - 邮件主题行避免促销词（Free/Discount/Limited Time），容易进垃圾箱
    - 序列触达一般7-12步，跨2-3周，不要同一天发多次
    - 个性化比群发有效10倍（提到对方公司最近新闻/招聘信息）

    # 电话外呼
    - 电话外呼注意当地法规（美国TCPA、欧盟GDPR、中国反电诈法）
    - 录音前必须告知（"This call may be recorded for quality purposes"）
    - 黄金拨打时间：周三/周四上午10-11点，下午2-4点

    # CRM数据治理
    - CRM数据必须及时更新Stage，否则漏斗预测失真
    - Lead进来24小时内必须首次触达，转化率最高
    - 商机金额、预计关单日期必须真实，不能为了好看虚报
    - 所有重要通话/会议必须记录Activity，否则AI预测无效
    - 定期清理Stale Leads（90天无活动的归档）

    # 合规和隐私
    - GDPR要求：欧盟联系人需明确同意（Opt-in），可随时要求删除数据
    - CAN-SPAM法（美国）：邮件必须有退订链接，10天内处理退订
    - CCPA（加州）：加州居民可要求查看/删除个人数据
    - 不要在未加密渠道（Slack/Email）传输客户敏感信息（信用卡/SSN）

    # 销售流程最佳实践
    - Discovery Call必须问BANT/MEDDIC问题，不要直接跳Demo
    - Demo要定制化，别演示客户不care的功能
    - 报价后48小时内跟进，否则冷掉概率大增
    - 永远要Champion（内部支持者），没Champion的Deal风险极高
    - Economic Buyer（签字人）必须至少参加1次会议
    - Mutual Action Plan让客户commit里程碑，避免"我们内部讨论讨论"

    # 佣金和激励
    - 佣金计划一年改一次，频繁改动销售无法规划
    - 加速器（超额完成奖励）一般120%以上开始，能激励冲刺
    - 新销售前3个月Ramp Period，不考核或降低Quota
    - 佣金争议必须透明快速解决，拖延会严重影响士气

    # 工具栈原则
    - CRM是唯一数据源(Single Source of Truth)，其他工具双向同步
    - 销售工具不要超过8个，太多切换降低效率
    - 新工具试点3个月，ROI不明显就砍掉

  typical_workflows:
    - name: SDR Outbound线索拓展
      steps: |
        1. 在Apollo/ZoomInfo按ICP搜索联系人
        2. 导入CRM并标记为Lead
        3. 数据富化（Clearbit补全公司信息）
        4. 加入Outreach序列（7步：邮件→电话→LinkedIn→邮件→电话→邮件→归档）
        5. 有回复→SDR做Discovery Call→验证BANT→标记为SQL
        6. 转给AE，CRM自动分配
      tools: [apollo-api, zoominfo-api, clearbit-api, salesforce-cli, outreach-api]

    - name: SDR Inbound响应
      steps: |
        1. 客户官网填表单/下载资料→自动进CRM（Lead）
        2. Clearbit自动富化公司信息
        3. Lead评分（ICP匹配度+行为分数）→达标自动变MQL
        4. SDR 24小时内触达（邮件+电话）
        5. Discovery Call验证需求→SQL
        6. 转AE，Chili Piper自动预约Demo
      tools: [salesforce-cli, clearbit-api, chilipiper-api, hubspot-cli]

    - name: AE Enterprise Deal跟单
      steps: |
        1. 收到SQL→CRM建Opportunity
        2. Discovery Call（问MEDDIC）→记录到CRM
        3. 定制化Demo（Gong录音+自动总结）
        4. 发Mutual Action Plan（双方里程碑）
        5. 技术评估/POC（Sales Engineer支持）
        6. 生成报价（Salesforce CPQ处理复杂折扣）→审批流
        7. 发提案（PandaDoc，追踪客户是否打开）
        8. 合同谈判→DocuSign签署
        9. Stripe/Invoice收款
        10. 标记Closed Won→转CSM
      tools: [salesforce-cli, gong-api, salesforce-cpq, pandadoc-api, docusign-sdk, stripe-cli]

    - name: PLG自助转化
      steps: |
        1. 用户免费注册试用→产品埋点追踪行为
        2. 达到PQL标准（如创建3个项目）→CRM自动建Lead
        3. 自动触发邮件序列（教育+案例）
        4. 用户点击"Upgrade"→自助选套餐→Stripe支付
        5. 高价值账户（>$10k潜力）→转人工Sales跟进
      tools: [hubspot-cli, stripe-cli, sendgrid-api]

    - name: ABM大客户攻坚
      steps: |
        1. RevOps筛选目标账户（ICP+收入潜力）
        2. 6sense识别意图信号（正在研究竞品/解决方案）
        3. ZoomInfo找决策链（VP/Director/Champion）
        4. 多线程触达（SDR打Champion，AE打Economic Buyer）
        5. 个性化内容（针对行业痛点的案例）
        6. Account-based广告（LinkedIn/Google定向投放）
        7. 高管晚宴/活动（线下建立关系）
        8. 进入销售流程（Discovery→Demo→POC→Proposal）
      tools: [sixsense-api, zoominfo-api, salesforce-cli, outreach-api, linkedin-sales-nav]

    - name: 季度销售预测
      steps: |
        1. RevOps从CRM拉所有Open Opportunities
        2. Clari AI预测每个Deal的成单概率
        3. 按Stage加权计算Weighted Pipeline
        4. 识别风险Deal（Gong显示客户犹豫/Clari标记活动少）
        5. Sales Manager 1-on-1 review每个Deal
        6. 提交Commit/Best Case/Pipeline三档预测
        7. 每周更新，跟踪准确率
      tools: [salesforce-cli, clari-api, gong-api, salesforce-einstein]

    - name: CSM续约和扩展
      steps: |
        1. 续约前90天→CSM审查客户健康度
        2. 产品使用数据分析（活跃度/采用率）
        3. Einstein预测流失风险→高风险客户优先介入
        4. QBR（季度业务回顾）展示ROI
        5. 发现扩展机会（新部门/新模块）→转AE或CSM自己跟
        6. 60天前发续约报价（Salesforce CPQ）
        7. DocuSign签署→自动更新订阅
      tools: [salesforce-cli, salesforce-einstein, salesforce-cpq, docusign-sdk]

    - name: 销售佣金计算和发放
      steps: |
        1. 月末→CRM导出所有Closed Won Deals
        2. 匹配佣金规则（基础佣金%+加速器+团队split）
        3. CaptivateIQ自动计算每个销售的佣金
        4. 销售在Dashboard实时查看佣金明细
        5. 争议提交→RevOps审核→调整
        6. 财务审批→下月工资发放
      tools: [salesforce-cli, captivateiq-api]

    - name: 通话录音分析和Coaching
      steps: |
        1. 销售电话/Demo自动录音（Gong/Chorus）
        2. AI转录+分析（客户痛点/竞品提及/异议/承诺）
        3. 自动生成Call Summary→同步到CRM
        4. Manager每周Review销售的通话（talk ratio/问题质量）
        5. 识别最佳实践通话→新人培训素材
        6. 1-on-1 Coaching（"你这里可以多问Why"）
      tools: [gong-api, chorus-ai, salesforce-cli]
