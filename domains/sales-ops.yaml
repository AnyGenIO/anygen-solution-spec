      - 自动创建客户会议
      - 与Google Calendar集成
    limits:
      - 录制和报告需Enterprise版
      - Meet本身API功能有限（主要通过Calendar API）
    docs: https://developers.google.com/calendar/api

  # ============================================================
  # 集成自动化
  # ============================================================

  - name: Zapier API
    id: zapier-api
    what: No-code集成自动化平台（连接7000+应用，小团队销售自动化首选）
    install: 无CLI，HTTP API调用（主要用Web界面）
    auth:
      required: true
      method: api_key
      env_vars:
        - ZAPIER_API_KEY
      how_to_get: "Zapier → Settings → APIs → Generate API Key"
      pricing: "Free版100 tasks/月 / Starter $29.99/月750 tasks / Professional $73.50/月2000 tasks"
    capabilities:
      - 触发器-动作自动化（如：HubSpot新Deal→Slack通知）
      - 多步Zap（3步+需付费）
      - 过滤和路径（条件逻辑）
      - 格式化数据（日期/文本转换）
      - Webhooks（接收和发送）
      - 常见销售自动化：
        * 新线索进CRM→发Slack通知
        * 表单提交→创建CRM联系人→发欢迎邮件
        * 签约成功→更新电子表格→发团队庆祝消息
        * Calendar预约→创建CRM任务
    when_to_use:
      - 中小团队无开发资源
      - 需要快速打通工具（CRM+邮件+Slack+表单等）
